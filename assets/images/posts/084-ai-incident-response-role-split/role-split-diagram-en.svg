<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">AI session role split</title>
  <desc id="desc">A diagram showing a single incident alert split into a rescue session and an investigation session.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker></defs>
  <rect width="1120" height="520" rx="14" fill="#1e1e1e"/>
  <text x="44" y="58" fill="#d4d4d4" font-family="Consolas, Arial, sans-serif" font-size="28" font-weight="700">One operator, two roles</text>
  <g font-family="Consolas, Arial, sans-serif">
    <g transform="translate(456 102)"><rect width="208" height="78" rx="10" fill="#3a2716" stroke="#f59e0b"/><text x="38" y="49" fill="#fbbf24" font-size="24">Incident alert</text></g>
    <g transform="translate(92 252)"><rect width="390" height="160" rx="12" fill="#252526" stroke="#4fc1ff"/><text x="28" y="45" fill="#4fc1ff" font-size="25">/rescue</text><text x="28" y="84" fill="#d4d4d4" font-size="19">Goal: service UP</text><text x="28" y="121" fill="#86efac" font-size="18">Allowed: restart, swap, health check</text><text x="28" y="148" fill="#fca5a5" font-size="18">Not allowed: code changes, RCA</text></g>
    <g transform="translate(638 252)"><rect width="390" height="160" rx="12" fill="#252526" stroke="#c586c0"/><text x="28" y="45" fill="#c586c0" font-size="25">/incident</text><text x="28" y="84" fill="#d4d4d4" font-size="19">Goal: find why it died</text><text x="28" y="121" fill="#e9d5ff" font-size="18">Inputs: logs, metrics, deploy diffs</text><text x="28" y="148" fill="#fca5a5" font-size="18">Not allowed: block rescue</text></g>
  </g>
  <g fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"><path d="M508 180 C396 200 300 218 286 248"/><path d="M612 180 C724 200 820 218 834 248"/><path d="M482 414 C522 454 598 454 638 414"/></g>
  <text x="428" y="466" fill="#858585" font-family="Consolas, Arial, sans-serif" font-size="18">Rescue handoff note → investigation session</text>
</svg>
