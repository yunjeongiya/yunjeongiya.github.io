    </g>
    <g transform="translate(292 204)">
      <rect width="150" height="76" rx="10" fill="#252526" stroke="#4fc1ff"/>
      <text x="22" y="32" fill="#d4d4d4" font-size="17">상태 확인</text>
      <text x="22" y="57" fill="#858585" font-size="15">health/logs</text>
    </g>
    <g transform="translate(482 204)">
      <rect width="150" height="76" rx="10" fill="#252526" stroke="#4fc1ff"/>
      <text x="22" y="32" fill="#d4d4d4" font-size="17">복구 실행</text>
      <text x="22" y="57" fill="#858585" font-size="15">restart/swap</text>
    </g>
    <g transform="translate(672 204)">
      <rect width="150" height="76" rx="10" fill="#15351f" stroke="#22c55e"/>
      <text x="22" y="32" fill="#86efac" font-size="17">UP 확인</text>
      <text x="22" y="57" fill="#86efac" font-size="15">handoff note</text>
    </g>
    <g transform="translate(292 310)">
      <rect width="150" height="76" rx="10" fill="#252526" stroke="#c586c0"/>
      <text x="22" y="32" fill="#d4d4d4" font-size="17">배포 커밋</text>
      <text x="22" y="57" fill="#858585" font-size="15">last 24h</text>
    </g>
    <g transform="translate(482 310)">
      <rect width="150" height="76" rx="10" fill="#252526" stroke="#c586c0"/>
