<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" role="img" aria-labelledby="title desc">
  <title id="title">복구와 조사 병렬 플로우</title>
  <desc id="desc">장애 알림 이후 rescue 세션과 incident 세션이 동시에 시작되고, 복구 완료 후 조사 세션이 수정과 문서화로 이어지는 타임라인.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1120" height="470" rx="14" fill="#1e1e1e"/>
  <text x="44" y="58" fill="#d4d4d4" font-family="D2Coding, Consolas, monospace" font-size="28" font-weight="700">실제 플로우: 먼저 살리고, 동시에 단서를 모은다</text>
  <g font-family="D2Coding, Consolas, monospace" font-size="18">
    <text x="74" y="142" fill="#fbbf24">T+0 알림</text>
    <text x="74" y="248" fill="#4fc1ff">/rescue</text>
    <text x="74" y="354" fill="#c586c0">/incident</text>
  </g>
  <g fill="none" stroke="#3c3c3c" stroke-width="3">
    <path d="M170 136h860"/>
    <path d="M170 242h860"/>
    <path d="M170 348h860"/>
  </g>
