<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">AI 세션 역할 분리 구조</title>
  <desc id="desc">하나의 장애 알림을 복구 세션과 조사 세션으로 나누어 처리하는 구조도.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1120" height="520" rx="14" fill="#1e1e1e"/>
  <text x="44" y="58" fill="#d4d4d4" font-family="D2Coding, Consolas, monospace" font-size="28" font-weight="700">한 명이 운영해도, 역할은 나눈다</text>
  <g font-family="D2Coding, Consolas, monospace">
    <g transform="translate(456 102)">
      <rect width="208" height="78" rx="10" fill="#3a2716" stroke="#f59e0b"/>
      <text x="42" y="49" fill="#fbbf24" font-size="24">장애 알림</text>
    </g>
    <g transform="translate(92 252)">
      <rect width="390" height="160" rx="12" fill="#252526" stroke="#4fc1ff"/>
      <text x="28" y="45" fill="#4fc1ff" font-size="25">/rescue</text>
      <text x="28" y="84" fill="#d4d4d4" font-size="19">목표: 서비스 UP</text>
      <text x="28" y="121" fill="#86efac" font-size="18">허용: restart, swap, health check</text>
      <text x="28" y="148" fill="#fca5a5" font-size="18">금지: 코드 수정, root cause 확정</text>
    </g>
    <g transform="translate(638 252)">
      <rect width="390" height="160" rx="12" fill="#252526" stroke="#c586c0"/>
      <text x="28" y="45" fill="#c586c0" font-size="25">/incident</text>
      <text x="28" y="84" fill="#d4d4d4" font-size="19">목표: 왜 죽었는지 찾기</text>
      <text x="28" y="121" fill="#e9d5ff" font-size="18">입력: 로그, 메트릭, 배포 커밋</text>
      <text x="28" y="148" fill="#fca5a5" font-size="18">금지: 복구 트랙 방해</text>
    </g>
  </g>
  <g fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)">
    <path d="M508 180 C396 200 300 218 286 248"/>
    <path d="M612 180 C724 200 820 218 834 248"/>
    <path d="M482 414 C522 454 598 454 638 414"/>
  </g>
  <text x="458" y="466" fill="#858585" font-family="D2Coding, Consolas, monospace" font-size="18">복구 완료 요약 → 조사 세션에 전달</text>
</svg>
