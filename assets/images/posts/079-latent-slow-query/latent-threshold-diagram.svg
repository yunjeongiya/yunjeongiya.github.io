<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Latent incident crosses a threshold without one clean trigger</title>
  <desc id="desc">Data growth and daily noise gradually push latency past the incident threshold.</desc>
  <rect width="900" height="420" rx="14" fill="#0d1117"/>
  <text x="42" y="52" fill="#8ab4f8" font-family="Segoe UI, sans-serif" font-size="24">Latent incident: no single clean trigger</text>
  <line x1="74" y1="326" x2="820" y2="326" stroke="#30363d" stroke-width="2"/>
  <line x1="92" y1="318" x2="92" y2="92" stroke="#30363d" stroke-width="2"/>
  <line x1="92" y1="150" x2="820" y2="150" stroke="#f2cc60" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="640" y="136" fill="#f2cc60" font-family="Consolas, monospace" font-size="17">incident threshold</text>
  <path d="M100 292 C210 286 285 272 352 248 S474 210 542 176 S650 142 804 118" fill="none" stroke="#58a6ff" stroke-width="5"/>
  <path d="M550 176 C612 164 666 145 804 118" fill="none" stroke="#f85149" stroke-width="5"/>
  <circle cx="664" cy="148" r="9" fill="#f85149" stroke="#ffd8d8" stroke-width="3"/>
  <rect x="550" y="232" width="230" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="574" y="260" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="18">yesterday vs today</text>
  <text x="574" y="286" fill="#8b949e" font-family="Consolas, monospace" font-size="15">tiny delta + noisy metrics</text>
  <text x="110" y="360" fill="#8b949e" font-family="Consolas, monospace" font-size="16">data growth over weeks</text>
  <text x="72" y="88" fill="#8b949e" font-family="Consolas, monospace" font-size="16">latency</text>
</svg>
