<svg xmlns="http://www.w3.org/2000/svg" width="980" height="480" viewBox="0 0 980 480" role="img" aria-labelledby="title desc">
  <title id="title">보이는 실패와 안 보이는 실패</title>
  <desc id="desc">over-action은 리뷰에서 즉시 보이고 under-action은 단기 리뷰에서 놓치기 쉬워 모델이 좁게 끝내는 쪽으로 기우는 구조</desc>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f87171"/></marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="980" height="480" rx="18" fill="#0d1117"/>
  <text x="490" y="48" text-anchor="middle" fill="#e5e7eb" font-family="'Malgun Gothic', Arial, 'Noto Sans KR', sans-serif" font-size="28" font-weight="700">평가 비대칭: 보이는 실패 vs 안 보이는 실패</text>
  <text x="490" y="80" text-anchor="middle" fill="#94a3b8" font-family="'Malgun Gothic', Arial, 'Noto Sans KR', sans-serif" font-size="17">모델은 리뷰에서 바로 혼나는 쪽을 피한다</text>

  <g font-family="'Malgun Gothic', Arial, 'Noto Sans KR', sans-serif">
    <rect x="70" y="122" width="370" height="250" rx="16" fill="#1f1417" stroke="#ef4444" stroke-width="2"/>
    <text x="255" y="164" text-anchor="middle" fill="#fca5a5" font-size="23" font-weight="700">over-action</text>
    <text x="255" y="196" text-anchor="middle" fill="#e5e7eb" font-size="17">안 시킨 것까지 함</text>
    <path d="M255 220 L255 270" stroke="#f87171" stroke-width="3" marker-end="url(#arrow-red)"/>
    <rect x="126" y="278" width="258" height="58" rx="10" fill="#111827" stroke="#7f1d1d"/>
    <text x="255" y="313" text-anchor="middle" fill="#fecaca" font-size="17">리뷰에서 즉시 보임</text>
    <text x="255" y="350" text-anchor="middle" fill="#fca5a5" font-size="15">페널티가 빠르다</text>

    <rect x="540" y="122" width="370" height="250" rx="16" fill="#101923" stroke="#38bdf8" stroke-width="2"/>
    <text x="725" y="164" text-anchor="middle" fill="#bae6fd" font-size="23" font-weight="700">under-action</text>
    <text x="725" y="196" text-anchor="middle" fill="#e5e7eb" font-size="17">해야 할 걸 안 함</text>
    <path d="M725 220 L725 270" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <rect x="596" y="278" width="258" height="58" rx="10" fill="#111827" stroke="#075985"/>
    <text x="725" y="313" text-anchor="middle" fill="#dbeafe" font-size="17">단기 리뷰에서 놓침</text>
    <text x="725" y="350" text-anchor="middle" fill="#93c5fd" font-size="15">페널티가 늦다</text>
  </g>

  <g font-family="'Malgun Gothic', Arial, 'Noto Sans KR', sans-serif">
    <rect x="265" y="404" width="450" height="46" rx="12" fill="#122033" stroke="#38bdf8"/>
    <text x="490" y="433" text-anchor="middle" fill="#e0f2fe" font-size="18" font-weight="700">결과: 모델은 좁게 끝내고 "나중에"라고 말하는 쪽을 고른다</text>
  </g>
</svg>
