<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">When vibe coding is efficient</title>
  <desc id="desc">Use AI as implementer when mistakes are easy to catch; use it as researcher or reviewer when mistakes are hard to catch</desc>
  <rect width="980" height="540" rx="18" fill="#0d1117"/>
  <text x="490" y="48" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="28" font-weight="700">When is vibe coding efficient?</text>
  <text x="490" y="82" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="17">Key question: can you catch AI mistakes quickly?</text>
  <g font-family="Arial, sans-serif">
    <rect x="58" y="124" width="392" height="340" rx="16" fill="#102016" stroke="#22c55e" stroke-width="2"/>
    <text x="254" y="165" text-anchor="middle" fill="#86efac" font-size="23" font-weight="700">Good to delegate</text>
    <text x="254" y="198" text-anchor="middle" fill="#bbf7d0" font-size="15">clear verification boundary</text>
    <g fill="#e5e7eb" font-size="17">
      <rect x="94" y="230" width="320" height="42" rx="8" fill="#111827" stroke="#166534"/>
      <text x="254" y="257" text-anchor="middle">drafts / scaffolding</text>
      <rect x="94" y="284" width="320" height="42" rx="8" fill="#111827" stroke="#166534"/>
      <text x="254" y="311" text-anchor="middle">test ideas</text>
      <rect x="94" y="338" width="320" height="42" rx="8" fill="#111827" stroke="#166534"/>
      <text x="254" y="365" text-anchor="middle">repetitive CRUD / DTOs</text>
      <rect x="94" y="392" width="320" height="42" rx="8" fill="#111827" stroke="#166534"/>
      <text x="254" y="419" text-anchor="middle">docs / comparison / search</text>
    </g>
    <rect x="530" y="124" width="392" height="340" rx="16" fill="#211416" stroke="#ef4444" stroke-width="2"/>
    <text x="726" y="165" text-anchor="middle" fill="#fca5a5" font-size="23" font-weight="700">Risky to hand off</text>
    <text x="726" y="198" text-anchor="middle" fill="#fecaca" font-size="15">mistakes appear late</text>
    <g fill="#e5e7eb" font-size="17">
      <rect x="566" y="230" width="320" height="42" rx="8" fill="#111827" stroke="#7f1d1d"/>
      <text x="726" y="257" text-anchor="middle">auth / payments / security</text>
      <rect x="566" y="284" width="320" height="42" rx="8" fill="#111827" stroke="#7f1d1d"/>
      <text x="726" y="311" text-anchor="middle">DB integrity / migrations</text>
      <rect x="566" y="338" width="320" height="42" rx="8" fill="#111827" stroke="#7f1d1d"/>
      <text x="726" y="365" text-anchor="middle">complex business logic</text>
      <rect x="566" y="392" width="320" height="42" rx="8" fill="#111827" stroke="#7f1d1d"/>
      <text x="726" y="419" text-anchor="middle">long-task finishing work</text>
    </g>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="178" y="486" width="624" height="36" rx="10" fill="#122033" stroke="#38bdf8"/>
    <text x="490" y="509" text-anchor="middle" fill="#e0f2fe" font-size="16" font-weight="700">If mistakes are easy to catch: implementer. Otherwise: researcher/reviewer.</text>
  </g>
</svg>
