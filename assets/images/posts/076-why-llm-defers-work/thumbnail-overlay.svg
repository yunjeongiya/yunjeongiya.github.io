<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="945" viewBox="0 0 1680 945" role="img" aria-labelledby="title desc">
  <title id="title">AI는 왜 미룰까? 텍스트 오버레이</title>
  <desc id="desc">생성형 배경 위에 합성할 블로그 썸네일 텍스트와 어두운 그라데이션</desc>
  <defs>
    <linearGradient id="leftShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#030712" stop-opacity="0.98"/>
      <stop offset="0.42" stop-color="#030712" stop-opacity="0.9"/>
      <stop offset="0.72" stop-color="#030712" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#030712" stop-opacity="0"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
  </defs>

  <rect width="1680" height="945" fill="url(#leftShade)"/>
  <rect x="70" y="76" width="126" height="50" rx="12" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="133" y="109" text-anchor="middle" fill="#67e8f9" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif" font-size="27" font-weight="800">076</text>

  <g filter="url(#textShadow)" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif">
    <text x="82" y="264" fill="#ffffff" font-size="92" font-weight="900">코딩 AI는</text>
    <text x="82" y="392" fill="#ffffff" font-size="118" font-weight="900">왜 자꾸</text>
    <text x="82" y="548" fill="#facc15" font-size="148" font-weight="900">미룰까?</text>
  </g>

  <rect x="82" y="626" width="620" height="74" rx="12" fill="#111827" fill-opacity="0.82" stroke="#38bdf8" stroke-width="2"/>
  <text x="112" y="674" fill="#e0f2fe" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif" font-size="38" font-weight="800">평가 비대칭의 함정</text>

  <g font-family="'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif" font-size="28" font-weight="700">
    <rect x="82" y="744" width="210" height="58" rx="29" fill="#12251c" stroke="#22c55e" stroke-width="2"/>
    <text x="187" y="782" text-anchor="middle" fill="#86efac">학습 데이터</text>
    <rect x="316" y="744" width="180" height="58" rx="29" fill="#2a2111" stroke="#f59e0b" stroke-width="2"/>
    <text x="406" y="782" text-anchor="middle" fill="#fcd34d">RLHF</text>
    <rect x="520" y="744" width="220" height="58" rx="29" fill="#2b1517" stroke="#ef4444" stroke-width="2"/>
    <text x="630" y="782" text-anchor="middle" fill="#fca5a5">평가 시스템</text>
