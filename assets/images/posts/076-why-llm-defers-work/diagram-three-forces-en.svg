<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Three forces that push coding AI toward deferring work</title>
  <desc id="desc">Training data, RLHF reward distortion, and evaluation asymmetry combine into temporary patches and deferred work</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/></filter>
  </defs>
  <rect width="980" height="520" rx="18" fill="#0d1117"/>
  <text x="490" y="48" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="28" font-weight="700">Why coding AI chooses "later"</text>
  <text x="490" y="82" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="17">Not one habit, but three pressures pointing the same way</text>
  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="58" y="130" width="248" height="168" rx="14" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <text x="182" y="166" text-anchor="middle" fill="#86efac" font-size="21" font-weight="700">Training Data</text>
    <text x="182" y="203" text-anchor="middle" fill="#e5e7eb" font-size="17">SATD / TODO</text>
    <text x="182" y="230" text-anchor="middle" fill="#e5e7eb" font-size="17">unpaid debt</text>
    <text x="182" y="257" text-anchor="middle" fill="#94a3b8" font-size="15">"fix later" pattern</text>
    <rect x="366" y="130" width="248" height="168" rx="14" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
    <text x="490" y="166" text-anchor="middle" fill="#fcd34d" font-size="21" font-weight="700">RLHF Reward</text>
    <text x="490" y="203" text-anchor="middle" fill="#e5e7eb" font-size="17">long plausible answers</text>
    <text x="490" y="230" text-anchor="middle" fill="#e5e7eb" font-size="17">confident tone</text>
    <text x="490" y="257" text-anchor="middle" fill="#94a3b8" font-size="15">deferral packaged well</text>
    <rect x="674" y="130" width="248" height="168" rx="14" fill="#111827" stroke="#ef4444" stroke-width="2"/>
    <text x="798" y="166" text-anchor="middle" fill="#fca5a5" font-size="21" font-weight="700">Eval Asymmetry</text>
    <text x="798" y="203" text-anchor="middle" fill="#e5e7eb" font-size="17">done work is visible</text>
    <text x="798" y="230" text-anchor="middle" fill="#e5e7eb" font-size="17">missing work is hidden</text>
    <text x="798" y="257" text-anchor="middle" fill="#94a3b8" font-size="15">under-action is safer</text>
  </g>
  <path d="M182 308 C182 366 352 376 430 390" stroke="#38bdf8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M490 308 L490 372" stroke="#38bdf8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M798 308 C798 366 628 376 550 390" stroke="#38bdf8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="285" y="386" width="410" height="86" rx="16" fill="#122033" stroke="#38bdf8" stroke-width="2"/>
    <text x="490" y="422" text-anchor="middle" fill="#e0f2fe" font-size="22" font-weight="700">Temporary Patch + Deferral</text>
    <text x="490" y="452" text-anchor="middle" fill="#bae6fd" font-size="16">"I'll handle this in the next PR"</text>
  </g>
</svg>
