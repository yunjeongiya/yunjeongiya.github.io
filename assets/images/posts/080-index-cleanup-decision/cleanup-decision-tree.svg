<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-labelledby="title desc">
  <title id="title">Index cleanup decision tree</title>
  <desc id="desc">Audit findings are classified into keep, drop, defer, and case-by-case actions.</desc>
  <rect width="900" height="450" rx="14" fill="#0d1117"/>
  <text x="42" y="52" fill="#8ab4f8" font-family="Segoe UI, sans-serif" font-size="24">124 findings are not 124 drops</text>
  <rect x="340" y="82" width="220" height="66" rx="10" fill="#161b22" stroke="#58a6ff"/>
  <text x="389" y="123" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="21">audit finding</text>
  <g stroke="#8b949e" stroke-width="2" fill="none">
    <path d="M450 148 L160 214"/><path d="M450 148 L350 214"/><path d="M450 148 L550 214"/><path d="M450 148 L740 214"/>
  </g>
  <g font-family="Segoe UI, sans-serif" font-size="19">
    <rect x="66" y="214" width="190" height="84" rx="10" fill="#0f2f1d" stroke="#2ea043"/>
    <text x="106" y="250" fill="#a7f3c4">FK protects?</text><text x="124" y="276" fill="#f0f6fc">KEEP</text>
    <rect x="286" y="214" width="190" height="84" rx="10" fill="#2a1115" stroke="#f85149"/>
    <text x="320" y="250" fill="#ffb3ad">never chosen?</text><text x="340" y="276" fill="#f0f6fc">DROP</text>
    <rect x="506" y="214" width="190" height="84" rx="10" fill="#2d2308" stroke="#f2cc60"/>
    <text x="548" y="250" fill="#ffe9a8">empty table?</text><text x="556" y="276" fill="#f0f6fc">DEFER</text>
    <rect x="714" y="214" width="140" height="84" rx="10" fill="#111827" stroke="#58a6ff"/>
    <text x="738" y="248" fill="#c9d1d9">active use?</text><text x="728" y="276" fill="#f0f6fc">CASE</text>
  </g>
  <rect x="194" y="346" width="512" height="54" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="238" y="380" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="20">classification first, DDL second</text>
</svg>
