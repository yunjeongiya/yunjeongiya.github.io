<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Cause victim check loop</title>
  <desc id="desc">For each leak warning source, run EXPLAIN and standalone timing, then classify as cause or victim.</desc>
  <rect width="900" height="420" rx="14" fill="#0d1117"/>
  <text x="42" y="52" fill="#8ab4f8" font-family="Segoe UI, sans-serif" font-size="25">Classify each warning before changing code</text>
  <g font-family="Segoe UI, sans-serif" font-size="20" fill="#f0f6fc">
    <rect x="70" y="112" width="190" height="74" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="108" y="156">leak source</text>
    <rect x="344" y="112" width="190" height="74" rx="10" fill="#161b22" stroke="#58a6ff"/>
    <text x="390" y="145">EXPLAIN</text><text x="382" y="170">+ timing</text>
    <rect x="620" y="72" width="210" height="74" rx="10" fill="#2a1115" stroke="#f85149"/>
    <text x="678" y="116">cause</text>
    <rect x="620" y="202" width="210" height="74" rx="10" fill="#2d2308" stroke="#f2cc60"/>
    <text x="678" y="246">victim</text>
  </g>
  <g stroke="#8b949e" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M260 149 L344 149"/>
    <path d="M534 149 C574 130 588 110 620 110"/>
    <path d="M534 149 C574 178 588 236 620 239"/>
  </g>
  <text x="630" y="168" fill="#ffb3ad" font-family="Consolas, monospace" font-size="15">slow alone</text>
  <text x="630" y="298" fill="#ffe9a8" font-family="Consolas, monospace" font-size="15">fast alone</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/></marker></defs>
</svg>
