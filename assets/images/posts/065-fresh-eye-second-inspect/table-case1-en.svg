<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title">
  <title id="title">Case 1 behavior table</title>
  <rect width="1100" height="420" rx="18" fill="#0d1117"/>
  <text x="550" y="42" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="26" font-weight="700">Case 1: What the Condition Actually Does</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="40" y="72" width="1020" height="54" fill="#111827" stroke="#334155"/>
    <text x="150" y="106" text-anchor="middle" fill="#93c5fd" font-weight="700">existing.campusId</text>
    <text x="380" y="106" text-anchor="middle" fill="#93c5fd" font-weight="700">request.campusId</text>
    <text x="650" y="106" text-anchor="middle" fill="#93c5fd" font-weight="700">Intended behavior</text>
    <text x="930" y="106" text-anchor="middle" fill="#93c5fd" font-weight="700">Actual behavior</text>
    <g fill="#e5e7eb">
      <rect x="40" y="126" width="1020" height="68" fill="#0f172a" stroke="#334155"/>
      <text x="150" y="166" text-anchor="middle">null (global)</text>
      <text x="380" y="166" text-anchor="middle">any value</text>
      <text x="650" y="166" text-anchor="middle">DEVELOPER only</text>
      <text x="930" y="166" text-anchor="middle" fill="#86efac">requireDeveloper</text>
      <rect x="40" y="194" width="1020" height="68" fill="#111827" stroke="#334155"/>
      <text x="150" y="234" text-anchor="middle">campus X</text>
      <text x="380" y="234" text-anchor="middle">same X</text>
      <text x="650" y="234" text-anchor="middle">TEACHER edits own content</text>
      <text x="930" y="234" text-anchor="middle" fill="#86efac">validateAccess</text>
      <rect x="40" y="262" width="1020" height="68" fill="#24171a" stroke="#7f1d1d"/>
      <text x="150" y="302" text-anchor="middle">campus X</text>
      <text x="380" y="292" text-anchor="middle">null</text>
      <text x="380" y="316" text-anchor="middle" fill="#cbd5e1" font-size="15">(field omitted)</text>
      <text x="650" y="302" text-anchor="middle">TEACHER edits another field</text>
      <text x="930" y="302" text-anchor="middle" fill="#fca5a5">requireDeveloper</text>
      <rect x="40" y="330" width="1020" height="68" fill="#0f172a" stroke="#334155"/>
      <text x="150" y="370" text-anchor="middle">campus X</text>
      <text x="380" y="370" text-anchor="middle">different campus Y</text>
      <text x="650" y="370" text-anchor="middle">TEACHER moves campus</text>
      <text x="930" y="370" text-anchor="middle" fill="#86efac">DEVELOPER gate</text>
    </g>
  </g>
</svg>
