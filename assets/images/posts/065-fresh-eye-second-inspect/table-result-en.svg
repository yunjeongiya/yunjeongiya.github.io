<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" role="img" aria-labelledby="title">
  <title id="title">Review result comparison table</title>
  <rect width="1000" height="420" rx="18" fill="#0d1117"/>
  <text x="500" y="42" text-anchor="middle" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="26" font-weight="700">Review Result</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="40" y="72" width="920" height="50" fill="#111827" stroke="#334155"/>
    <text x="170" y="104" text-anchor="middle" fill="#93c5fd" font-weight="700">Item</text>
    <text x="470" y="104" text-anchor="middle" fill="#93c5fd" font-weight="700">First pass</text>
    <text x="780" y="104" text-anchor="middle" fill="#93c5fd" font-weight="700">Second pass</text>
    <g fill="#e5e7eb">
      <rect x="40" y="122" width="920" height="48" fill="#0f172a" stroke="#334155"/>
      <text x="170" y="153" text-anchor="middle">Findings</text><text x="470" y="153" text-anchor="middle">12</text><text x="780" y="153" text-anchor="middle" fill="#86efac">5</text>
      <rect x="40" y="170" width="920" height="48" fill="#24171a" stroke="#7f1d1d"/>
      <text x="170" y="201" text-anchor="middle">Critical</text><text x="470" y="201" text-anchor="middle">0</text><text x="780" y="201" text-anchor="middle" fill="#fca5a5">1 normal case blocked</text>
      <rect x="40" y="218" width="920" height="48" fill="#0f172a" stroke="#334155"/>
      <text x="170" y="249" text-anchor="middle">Important</text><text x="470" y="249" text-anchor="middle">4</text><text x="780" y="249" text-anchor="middle" fill="#86efac">4</text>
      <rect x="40" y="266" width="920" height="48" fill="#111827" stroke="#334155"/>
      <text x="170" y="297" text-anchor="middle">Low</text><text x="470" y="297" text-anchor="middle">8</text><text x="780" y="297" text-anchor="middle">0</text>
      <rect x="40" y="314" width="920" height="48" fill="#0f172a" stroke="#334155"/>
      <text x="170" y="345" text-anchor="middle">False positive</text><text x="470" y="345" text-anchor="middle">H4 already applied</text><text x="780" y="345" text-anchor="middle">-</text>
      <rect x="40" y="362" width="920" height="48" fill="#111827" stroke="#334155"/>
      <text x="170" y="393" text-anchor="middle">Read backwards</text><text x="470" y="393" text-anchor="middle">-</text><text x="780" y="393" text-anchor="middle" fill="#fbbf24">1 case</text>
    </g>
  </g>
</svg>
