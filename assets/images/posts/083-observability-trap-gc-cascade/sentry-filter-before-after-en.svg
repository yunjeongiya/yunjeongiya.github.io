<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Before and after Sentry filtering</title>
  <desc id="desc">A comparison between capturing every BusinessException and excluding noisy normal-flow error codes.</desc>
  <defs><marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/></marker></defs>
  <rect width="1120" height="500" rx="14" fill="#1e1e1e"/>
  <text x="44" y="58" fill="#d4d4d4" font-family="Consolas, Arial, sans-serif" font-size="28" font-weight="700">Fix: capture useful exceptions, not every exception</text>
  <g font-family="Consolas, Arial, sans-serif">
    <g transform="translate(54 108)"><rect width="478" height="300" rx="12" fill="#252526" stroke="#3c3c3c"/><text x="28" y="45" fill="#f87171" font-size="24">Before</text><text x="28" y="85" fill="#cccccc" font-size="18">Capture every BusinessException</text><g transform="translate(30 125)" font-size="17"><rect width="390" height="34" rx="6" fill="#3b1d21"/><text x="16" y="23" fill="#fca5a5">DEVICE_PROFILE_NOT_FOUND</text><rect y="48" width="330" height="34" rx="6" fill="#3b1d21"/><text x="16" y="71" fill="#fca5a5">AUTH_REFRESH_TOKEN_MISSING</text><rect y="96" width="260" height="34" rx="6" fill="#1f2937"/><text x="16" y="119" fill="#d4d4d4">real bug exception</text></g><text x="292" y="260" fill="#fca5a5" font-size="18">noise and cost</text></g>
    <g transform="translate(588 108)"><rect width="478" height="300" rx="12" fill="#252526" stroke="#3c3c3c"/><text x="28" y="45" fill="#4ade80" font-size="24">After</text><text x="28" y="85" fill="#cccccc" font-size="18">Exclude SENTRY_NOISE_CODES</text><g transform="translate(30 125)" font-size="17"><rect width="390" height="34" rx="6" fill="#15351f" stroke="#22c55e"/><text x="16" y="23" fill="#86efac">normal-flow exceptions: logs only</text><rect y="56" width="300" height="34" rx="6" fill="#1f2937" stroke="#4fc1ff"/><text x="16" y="79" fill="#d4d4d4">bug-like exceptions: capture</text><rect y="112" width="230" height="34" rx="6" fill="#1f2937" stroke="#4fc1ff"/><text x="16" y="135" fill="#d4d4d4">signal stays useful</text></g><text x="264" y="260" fill="#86efac" font-size="18">less noise, less cost</text></g>
  </g>
</svg>
