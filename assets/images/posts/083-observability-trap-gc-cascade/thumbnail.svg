<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Sentry capture causing GC cascade</title>
  <desc id="desc">A dark editor-style incident thumbnail showing exception events flowing through Sentry capture into heap pressure, full GC, and connection pool exhaustion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1e1e"/>
      <stop offset="0.58" stop-color="#252526"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="52" y="48" width="1096" height="579" rx="18" fill="#1b1b1c" stroke="#3c3c3c"/>
  <rect x="52" y="48" width="1096" height="42" rx="18" fill="#2d2d30"/>
  <circle cx="82" cy="69" r="7" fill="#f87171"/>
  <circle cx="106" cy="69" r="7" fill="#fbbf24"/>
  <circle cx="130" cy="69" r="7" fill="#34d399"/>
  <text x="168" y="75" fill="#cccccc" font-family="Consolas, D2Coding, monospace" font-size="18">GlobalExceptionHandler.java</text>

  <g transform="translate(96 130)">
    <rect width="360" height="360" rx="12" fill="#252526" stroke="#3c3c3c"/>
    <text x="26" y="42" fill="#569cd6" font-family="Consolas, D2Coding, monospace" font-size="25">BusinessException</text>
    <text x="26" y="86" fill="#ce9178" font-family="Consolas, D2Coding, monospace" font-size="24">DEVICE_PROFILE_NOT_FOUND</text>
    <g fill="none" stroke="#6a9955" stroke-width="2">
      <path d="M28 132h260"/>
      <path d="M28 166h210"/>
      <path d="M28 200h280"/>
      <path d="M28 234h235"/>
    </g>
    <g transform="translate(24 266)">
      <rect width="312" height="58" rx="8" fill="#1e1e1e" stroke="#4b5563"/>
      <text x="18" y="37" fill="#dcdcaa" font-family="Consolas, D2Coding, monospace" font-size="22">captureException(ex)</text>
    </g>
  </g>

  <path d="M490 305 C560 305 570 215 640 215" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M490 340 C570 340 570 455 650 455" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <g fill="#f59e0b">
    <circle cx="515" cy="302" r="5"/>
    <circle cx="545" cy="276" r="5"/>
    <circle cx="575" cy="238" r="5"/>
  </g>

  <g transform="translate(650 122)">
    <rect width="420" height="142" rx="12" fill="#252526" stroke="#3c3c3c"/>
    <text x="28" y="42" fill="#4fc1ff" font-family="Consolas, D2Coding, monospace" font-size="28">Sentry SDK</text>
    <text x="28" y="82" fill="#cccccc" font-family="Consolas, D2Coding, monospace" font-size="21">serialize → queue → send</text>
    <rect x="28" y="104" width="360" height="16" rx="8" fill="#3c3c3c"/>
    <rect x="28" y="104" width="286" height="16" rx="8" fill="url(#amber)"/>
  </g>

  <g transform="translate(650 318)">
    <rect width="420" height="210" rx="12" fill="#252526" stroke="#3c3c3c"/>
    <text x="28" y="46" fill="#c586c0" font-family="Consolas, D2Coding, monospace" font-size="31">GC cascade</text>
    <g font-family="Consolas, D2Coding, monospace" font-size="22">
      <text x="30" y="91" fill="#dcdcaa">Heap pressure ↑</text>
      <text x="30" y="128" fill="#f59e0b">Full GC pause</text>
      <text x="30" y="165" fill="#ef4444">Hikari pool timeout</text>
    </g>
    <g transform="translate(250 58)">
      <circle cx="58" cy="58" r="50" fill="none" stroke="#3c3c3c" stroke-width="14"/>
      <path d="M58 8 A50 50 0 1 1 16 84" fill="none" stroke="#ef4444" stroke-width="14" stroke-linecap="round"/>
      <text x="32" y="68" fill="#f5f5f5" font-family="Consolas, D2Coding, monospace" font-size="28">98%</text>
    </g>
  </g>
</svg>
