<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px;
    gap: 24px;
  }
  .pipeline { display: flex; align-items: center; gap: 0; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .stage-box {
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    min-width: 100px;
    border: 2px solid;
  }
  .stage-label { font-size: 11px; max-width: 110px; text-align: center; line-height: 1.4; }
  .arrow { font-size: 20px; margin: 0 6px; margin-bottom: 20px; }
  .row-container { display: flex; align-items: flex-start; gap: 20px; width: 750px; }
  .row-label { font-size: 13px; font-weight: 700; min-width: 80px; text-align: right; padding-top: 14px; }
  .compiler .stage-box { background: #2a2a4a; border-color: #5a5a8a; color: #b0b0d0; }
  .compiler .stage-label { color: #7a7aa0; }
  .compiler .arrow { color: #5a5a8a; }
  .compiler .row-label { color: #8080b0; }
  .serena .stage-box.active { background: #1a3a2a; border-color: #51cf66; color: #69db7c; }
  .serena .stage-box.inactive { background: #1a1a2e; border-color: #333; color: #444; }
  .serena .stage-label.active { color: #51cf66; }
  .serena .stage-label.inactive { color: #444; }
  .serena .arrow.active { color: #51cf66; }
  .serena .arrow.inactive { color: #333; }
  .serena .row-label { color: #51cf66; }
  .serena .stage-box.output { background: #1a2a3a; border-color: #339af0; color: #74c0fc; }
  .serena .stage-label.output { color: #339af0; }
  .serena .arrow.output { color: #339af0; }
  .title { font-size: 18px; font-weight: 700; color: #e6edf3; margin-bottom: 8px; }
  .subtitle { font-size: 12px; color: #6b7b8a; margin-bottom: 16px; }
</style>
</head>
<body>
  <div class="title">Compiler vs Serena</div>
  <div class="subtitle">Same technology, different purpose</div>
  <div class="row-container compiler">
    <div class="row-label">Compiler</div>
    <div class="pipeline">
      <div class="stage"><div class="stage-box">Source Code</div><div class="stage-label">Written by dev</div></div>
      <div class="arrow">→</div>
      <div class="stage"><div class="stage-box">Lexing</div><div class="stage-label">Text → Tokens</div></div>
      <div class="arrow">→</div>
      <div class="stage"><div class="stage-box">Parsing</div><div class="stage-label">Build AST</div></div>
      <div class="arrow">→</div>
      <div class="stage"><div class="stage-box">Optimize</div><div class="stage-label">Performance</div></div>
      <div class="arrow">→</div>
      <div class="stage"><div class="stage-box">Binary</div><div class="stage-label">Machine code</div></div>
    </div>
  </div>
  <div class="row-container serena">
    <div class="row-label">Serena</div>
    <div class="pipeline">
      <div class="stage"><div class="stage-box active">Source Code</div><div class="stage-label active">Written by dev</div></div>
      <div class="arrow active">→</div>
      <div class="stage"><div class="stage-box active">Lexing</div><div class="stage-label active">tree-sitter</div></div>
      <div class="arrow active">→</div>
      <div class="stage"><div class="stage-box active">Parsing</div><div class="stage-label active">Build AST</div></div>
      <div class="arrow output">→</div>
      <div class="stage"><div class="stage-box output">Expose to AI</div><div class="stage-label output">MCP Tools</div></div>
      <div class="arrow inactive">→</div>
      <div class="stage"><div class="stage-box inactive">Not used</div><div class="stage-label inactive">&nbsp;</div></div>
    </div>
  </div>
</body>
</html>
