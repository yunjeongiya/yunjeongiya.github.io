<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #abc1d1;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .chat-container {
    width: 380px;
    background: #abc1d1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin-bottom: 2px;
  }
  .msg-row.right { flex-direction: row-reverse; }
  .msg-row.left { flex-direction: row; }
  .bubble {
    max-width: 240px;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: keep-all;
  }
  .bubble.yellow {
    background: #fee500;
    color: #1a1a1a;
    border-radius: 12px 12px 2px 12px;
  }
  .bubble.white {
    background: #fff;
    color: #1a1a1a;
    border-radius: 12px 12px 12px 2px;
  }
  .time {
    font-size: 10px;
    color: #6b7b8a;
    white-space: nowrap;
    margin-bottom: 2px;
  }
  .name {
    font-size: 11px;
    font-weight: 600;
    color: #3a3a3a;
    margin-bottom: 2px;
    margin-left: 4px;
  }
  .name-group { margin-top: 8px; }
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: #6b7b8a;
    margin: 8px 0;
    background: rgba(0,0,0,0.08);
    border-radius: 12px;
    padding: 4px 12px;
    align-self: center;
  }
</style>
</head>
<body>
<div class="chat-container">

  <!-- Part 1: 고민 토로 -->
  <div class="name-group">
    <div class="name">친구</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">야 나 클로드 토큰 너무 빨리 닳아</div>
    <div class="time">오후 3:12</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">오늘 3번밖에 못 돌림</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">바이브코딩 이러면 못하겠는데</div>
  </div>

  <div class="msg-row right" style="margin-top: 12px;">
    <div class="bubble yellow">Serena MCP 깔아봐</div>
    <div class="time">오후 3:30</div>
  </div>
  <div class="msg-row right">
    <div class="bubble yellow">토큰 아껴주는 도구인데 무료야</div>
  </div>

  <!-- Part 2: 시간 경과 후 반응 -->
  <div class="date-divider">몇 시간 후</div>

  <div class="name-group">
    <div class="name">친구</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">엥 세레나 이게 어케</div>
    <div class="time">오후 8:30</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">무료지</div>
  </div>

  <div class="msg-row right" style="margin-top: 12px;">
    <div class="bubble yellow">오 깔아써?</div>
    <div class="time">오후 9:04</div>
  </div>

  <div class="name-group">
    <div class="name">친구</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">와 그래도 이거 안 했으면</div>
    <div class="time">오후 9:47</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">오늘 3번 돌리고 끝났을 듯</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">윤정아 고마워</div>
  </div>

  <div class="msg-row right" style="margin-top: 12px;">
    <div class="bubble yellow">대박 도움이 됐다니</div>
    <div class="time">오후 9:58</div>
  </div>

  <!-- Part 3: 펀치라인 -->
  <div class="name-group">
    <div class="name">친구</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">근데 웃긴 게</div>
    <div class="time">오후 10:19</div>
  </div>
  <div class="msg-row left">
    <div class="bubble white">AI를 잘 활용하기 위해서<br>AI한테 사용법이랑 프롬프트를 묻고 있는 게<br>너무 웃겨 ㅋㅋ</div>
  </div>

</div>
</body>
</html>
