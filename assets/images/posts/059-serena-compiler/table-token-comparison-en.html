<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  table {
    border-collapse: collapse;
    font-size: 15px;
    min-width: 480px;
  }
  th {
    background: #f6f8fa;
    font-weight: 700;
    color: #24292f;
    padding: 12px 20px;
    border: 1px solid #d0d7de;
    text-align: left;
  }
  td {
    padding: 12px 20px;
    border: 1px solid #d0d7de;
    color: #1f2328;
  }
  tr:nth-child(1) td:last-child { color: #cf222e; font-weight: 700; }
  tr:nth-child(2) td:last-child { color: #1a7f37; font-weight: 700; }
</style>
</head>
<body>
<table>
  <thead>
    <tr><th>Method</th><th>What it does</th><th>Tokens used</th></tr>
  </thead>
  <tbody>
    <tr><td>Default (read entire file)</td><td>Reads all 500 lines</td><td>~2,000</td></tr>
    <tr><td>Serena (symbol search)</td><td>Reads only the 5-line method</td><td>~50</td></tr>
  </tbody>
</table>
</body>
</html>
