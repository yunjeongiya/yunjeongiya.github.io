<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Optimizer chose a low-cardinality single-column index over the compound index</title>
  <desc id="desc">A query planner splits into a red low-cardinality index path and a green compound covering index path.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c9d1d9"/>
    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="420" rx="14" fill="#0d1117"/>
  <text x="42" y="52" fill="#8ab4f8" font-family="Consolas, monospace" font-size="24">WHERE group_id IN (...) AND leaf_flag = 1</text>
  <rect x="56" y="92" width="220" height="72" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="88" y="136" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="21">Query Planner</text>
  <line x1="276" y1="128" x2="392" y2="128" stroke="#c9d1d9" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="410" y="64" width="208" height="98" rx="10" fill="#2a1115" stroke="#f85149" stroke-width="2" filter="url(#glow)"/>
  <text x="438" y="102" fill="#ffb3ad" font-family="Segoe UI, sans-serif" font-size="20">idx_leaf_flag</text>
  <text x="438" y="132" fill="#ffdad7" font-family="Consolas, monospace" font-size="16">cardinality = 1</text>
  <line x1="514" y1="162" x2="514" y2="224" stroke="#f85149" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="410" y="238" width="208" height="98" rx="10" fill="#092d26" stroke="#2ea043" stroke-width="2"/>
  <text x="432" y="276" fill="#a7f3c4" font-family="Segoe UI, sans-serif" font-size="19">compound index</text>
  <text x="432" y="306" fill="#d2ffe4" font-family="Consolas, monospace" font-size="16">group, flag, order</text>
  <line x1="618" y1="113" x2="728" y2="113" stroke="#f85149" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="738" y="64" width="124" height="98" rx="10" fill="#161b22" stroke="#f85149"/>
  <text x="772" y="103" fill="#f85149" font-family="Segoe UI, sans-serif" font-size="22">chosen</text>
  <text x="762" y="132" fill="#f0f6fc" font-family="Consolas, monospace" font-size="15">filesort</text>
  <line x1="618" y1="287" x2="728" y2="287" stroke="#2ea043" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <rect x="738" y="238" width="124" height="98" rx="10" fill="#161b22" stroke="#2ea043"/>
  <text x="766" y="278" fill="#7ee787" font-family="Segoe UI, sans-serif" font-size="22">better</text>
  <text x="754" y="307" fill="#f0f6fc" font-family="Consolas, monospace" font-size="15">not used</text>
</svg>
